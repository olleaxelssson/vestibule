  --------------------------------------------------------------
  Paste this entire file into a GoDaddy "HTML / Custom Code" SECTION.
  (Add Section -> search "HTML" -> Embed -> paste -> Save.)
  It is fully self-contained: no external files, only one Google Font.
  GoDaddy runs custom code inside an isolated iframe, so this widget
  cannot touch the rest of your page — which is exactly why it is safe.

  >>> ONE THING TO EDIT: search for  REPLACE-WITH-YOUR-HIDDEN-PAGE-URL
      and swap in the real path of your hidden page (e.g. /seventeen).

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Vestibule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap');

  :root{
    --ink:#0a0a0c;
    --bone:#e8e2d4;
    --bone-dim:rgba(232,226,212,.5);
    --signal:#b23a2e;
    --system:#7d8a91;
    --ring:rgba(232,226,212,.16);
  }

  *{margin:0;padding:0;box-sizing:border-box}

  html,body{height:100%}

  body{
    background:var(--ink);
    color:var(--bone);
    font-family:'JetBrains Mono',monospace;
    overflow:hidden;
    position:relative;
    /* radial breathing field behind everything */
    background-image:radial-gradient(circle at 50% 42%, rgba(40,40,46,.55) 0%, rgba(10,10,12,1) 62%);
  }

  /* cursor-reactive light */
  #light{
    position:fixed;
    width:540px;height:540px;
    top:0;left:0;
    margin:-270px 0 0 -270px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle, rgba(178,58,46,.10) 0%, rgba(178,58,46,0) 70%);
    transition:opacity 1.2s ease;
    opacity:0;
    z-index:1;
  }

  /* vignette */
  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:3;
    background:radial-gradient(circle at 50% 45%, transparent 40%, rgba(0,0,0,.55) 100%);
  }

  /* film grain */
  #grain{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:.045;mix-blend-mode:overlay}

  .stage{
    position:relative;z-index:2;
    height:100vh;width:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:clamp(18px,4vh,40px);
    padding:6vh 6vw;
    text-align:center;
  }

  /* ---------- the aperture ---------- */
  .aperture-wrap{
    width:clamp(150px,30vmin,260px);
    aspect-ratio:1;
    cursor:pointer;
    position:relative;
    animation:breathe 7s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);filter:drop-shadow(0 0 18px rgba(178,58,46,.10))}
    50%{transform:scale(1.035);filter:drop-shadow(0 0 34px rgba(178,58,46,.22))}
  }
  .aperture-wrap svg{width:100%;height:100%;overflow:visible}
  .ring-rot{transform-origin:50% 50%;animation:rot 90s linear infinite}
  .ring-rot.rev{animation:rot 120s linear infinite reverse}
  @keyframes rot{to{transform:rotate(360deg)}}

  #pupil{
    transform-origin:50% 50%;
    transition:transform 1.6s cubic-bezier(.22,1,.36,1),fill .8s ease;
    transform:scale(1);
  }
  .aperture-wrap.dilate #pupil{transform:scale(.18)}
  .aperture-wrap.open #pupil{transform:scale(.04)}

  .seal-mark{font-family:'JetBrains Mono';font-size:6px;letter-spacing:3px;fill:var(--bone-dim)}

  /* ---------- text ---------- */
  .greeting{
    font-family:'Cormorant',serif;
    font-weight:500;
    font-size:clamp(20px,3.4vw,34px);
    line-height:1.35;
    letter-spacing:.5px;
    max-width:24ch;
    min-height:2.7em;
    color:var(--bone);
  }
  .greeting .cursor{
    display:inline-block;width:.5ch;
    background:var(--signal);
    animation:blink 1.1s steps(1) infinite;
    margin-left:2px;
  }
  @keyframes blink{50%{opacity:0}}

  .sub{
    font-size:clamp(9px,1.4vw,11px);
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--system);
    font-weight:300;
  }

  /* ---------- designation input ---------- */
  .knock{
    display:flex;flex-direction:column;align-items:center;gap:12px;
    opacity:0;transform:translateY(8px);
    animation:rise 1.4s ease forwards 4.2s;
  }
  @keyframes rise{to{opacity:1;transform:none}}

  .field{
    display:flex;align-items:center;gap:0;
    border-bottom:1px solid var(--ring);
    padding:6px 4px;
    transition:border-color .5s ease;
  }
  .field:focus-within{border-color:var(--signal)}
  .field span{color:var(--system);font-size:12px;margin-right:8px;user-select:none}
  .field input{
    background:transparent;border:none;outline:none;
    color:var(--bone);
    font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;
    text-transform:uppercase;width:min(46vw,200px);
    text-align:center;
  }
  .field input::placeholder{color:rgba(125,138,145,.45);letter-spacing:2px}

  .hint{
    font-size:9px;letter-spacing:3px;text-transform:uppercase;
    color:rgba(125,138,145,.55);min-height:1.2em;
    transition:color .4s ease;
  }
  .hint.err{color:var(--signal)}

  .reveal{
    max-width:30ch;
    font-family:'Cormorant',serif;font-style:italic;
    font-size:clamp(14px,2vw,18px);
    color:var(--bone);
    opacity:0;height:0;overflow:hidden;
    transition:opacity 1.4s ease;
  }
  .reveal.show{opacity:1;height:auto;margin-top:6px}
  .reveal a{
    display:inline-block;margin-top:14px;
    font-family:'JetBrains Mono';font-style:normal;
    font-size:11px;letter-spacing:4px;text-transform:uppercase;
    color:var(--signal);text-decoration:none;
    border:1px solid rgba(178,58,46,.4);
    padding:9px 18px;
    transition:all .5s ease;
  }
  .reveal a:hover{background:var(--signal);color:var(--ink);letter-spacing:5px}

  .shake{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* ---------- sound toggle ---------- */
  #sound{
    position:fixed;bottom:18px;right:18px;z-index:6;
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--ring);background:rgba(10,10,12,.5);
    color:var(--system);cursor:pointer;
    font-family:'JetBrains Mono';font-size:13px;
    display:flex;align-items:center;justify-content:center;
    transition:all .5s ease;backdrop-filter:blur(2px);
  }
  #sound:hover{border-color:var(--signal);color:var(--bone)}
  #sound.on{color:var(--signal);border-color:var(--signal)}

  .whisper{
    position:fixed;bottom:18px;left:18px;z-index:6;
    font-size:8px;letter-spacing:3px;text-transform:uppercase;
    color:rgba(125,138,145,.3);
  }
</style>
</head>
<body>
  <div id="light"></div>
  <canvas id="grain"></canvas>
  <div id="vignette"></div>

  <div class="stage">
    <div class="aperture-wrap" id="aperture" title="">
      <svg viewBox="0 0 200 200" aria-hidden="true">
        <g class="ring-rot">
          <circle cx="100" cy="100" r="92" fill="none" stroke="var(--ring)" stroke-width="1" stroke-dasharray="2 6"/>
        </g>
        <g class="ring-rot rev">
          <circle cx="100" cy="100" r="78" fill="none" stroke="var(--ring)" stroke-width="1"/>
          <text class="seal-mark"><textPath href="#sealpath" startOffset="0">VESTIBULVM · NON · INVITATVS · INTRAVISTI · </textPath></text>
        </g>
        <path id="sealpath" d="M100,100 m-70,0 a70,70 0 1,1 140,0 a70,70 0 1,1 -140,0" fill="none"/>
        <circle cx="100" cy="100" r="58" fill="none" stroke="rgba(232,226,212,.10)" stroke-width="1"/>
        <circle id="pupil" cx="100" cy="100" r="50" fill="rgba(178,58,46,.16)" stroke="var(--signal)" stroke-width="1"/>
        <circle cx="100" cy="100" r="3" fill="var(--signal)"/>
      </svg>
    </div>

    <p class="greeting" id="greeting"><span class="cursor">&nbsp;</span></p>
    <p class="sub">The Vestibule — Threshold Registry</p>

    <div class="knock">
      <div class="field">
        <span>&gt;</span>
        <input id="code" type="text" maxlength="16" placeholder="enter your designation" autocomplete="off" spellcheck="false" />
      </div>
      <p class="hint" id="hint">most who arrive do not know what to type</p>
      <p class="reveal" id="reveal"></p>
    </div>
  </div>

  <button id="sound" aria-label="Toggle ambient sound">◐</button>
  <div class="whisper">it is always the same hour here</div>

<script>
(function(){
  "use strict";

  /* ---------- cursor light ---------- */
  var light=document.getElementById('light');
  var lx=window.innerWidth/2, ly=window.innerHeight/2, cx=lx, cy=ly;
  document.addEventListener('pointermove',function(e){lx=e.clientX;ly=e.clientY;light.style.opacity=1;});
  document.addEventListener('pointerleave',function(){light.style.opacity=0;});
  (function follow(){cx+=(lx-cx)*.06;cy+=(ly-cy)*.06;light.style.transform='translate('+cx+'px,'+cy+'px)';requestAnimationFrame(follow);})();

  /* ---------- film grain ---------- */
  var cv=document.getElementById('grain'), ctx=cv.getContext('2d');
  function size(){cv.width=Math.floor(innerWidth/2);cv.height=Math.floor(innerHeight/2);cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
  size(); addEventListener('resize',size);
  function noise(){
    var id=ctx.createImageData(cv.width,cv.height),d=id.data;
    for(var i=0;i<d.length;i+=4){var v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
    ctx.putImageData(id,0,0);
  }
  var last=0;
  (function grainLoop(t){ if(t-last>55){noise();last=t;} requestAnimationFrame(grainLoop); })(0);

  /* ---------- type-on greeting ---------- */
  var lines=[
    "You were not invited.",
    "You came anyway.",
    "We find this acceptable."
  ];
  var g=document.getElementById('greeting');
  var li=0, ci=0, buffer="";
  function type(){
    if(li>=lines.length){ g.innerHTML=lines.join(' ')+'<span class="cursor">&nbsp;</span>'; return; }
    var line=lines[li];
    if(ci<=line.length){
      g.innerHTML=buffer+line.slice(0,ci)+'<span class="cursor">&nbsp;</span>';
      ci++; setTimeout(type, 42 + Math.random()*40);
    }else{
      buffer+=line+' '; li++; ci=0; setTimeout(type, 620);
    }
  }
  setTimeout(type, 900);

  /* ---------- aperture: dilate on hover, secret on 7 clicks ---------- */
  var ap=document.getElementById('aperture');
  ap.addEventListener('pointerenter',function(){ap.classList.add('dilate');});
  ap.addEventListener('pointerleave',function(){if(!ap.classList.contains('locked'))ap.classList.remove('dilate');});
  var clicks=0, clickTimer=null;
  ap.addEventListener('click',function(){
    clicks++;
    clearTimeout(clickTimer);
    clickTimer=setTimeout(function(){clicks=0;},1400);
    if(clicks>=7){
      ap.classList.add('open','locked');
      document.querySelector('.whisper').textContent='the eye remembers your face';
      clicks=0;
    }
  });

  /* ---------- the designation puzzle ---------- */
  // Accepted answers. The homepage copy plants the clue:
  // "the seventeenth threshold was never sealed."
  var ACCEPT=['VST-017','VST017','017','17','SEVENTEEN','TROSKELN','TRÖSKELN'];
  var input=document.getElementById('code');
  var hint=document.getElementById('hint');
  var reveal=document.getElementById('reveal');
  var field=document.querySelector('.field');

  function attempt(){
    var v=input.value.trim().toUpperCase();
    if(!v) return;
    if(ACCEPT.indexOf(v)>-1){
      hint.classList.remove('err');
      hint.textContent='threshold recognised';
      reveal.innerHTML='Threshold 017 was never sealed. It has been waiting.'+
        // EDIT the href below to your real hidden page URL (target=_top breaks out of the iframe):
        '<a href="REPLACE-WITH-YOUR-HIDDEN-PAGE-URL" target="_top">step through &nbsp;&rarr;</a>';
      reveal.classList.add('show');
      ap.classList.add('open','locked');
      input.disabled=true;
    }else{
      hint.classList.add('err');
      hint.textContent='[ sealed ] — that designation is not yours';
      field.classList.add('shake');
      setTimeout(function(){field.classList.remove('shake');},420);
    }
  }
  input.addEventListener('keydown',function(e){ if(e.key==='Enter') attempt(); });
  input.addEventListener('blur',attempt);

  /* ---------- opt-in ambient drone (Web Audio, user-triggered) ---------- */
  var btn=document.getElementById('sound'), actx=null, on=false, nodes=[];
  btn.addEventListener('click',function(){
    if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); }
    if(actx.state==='suspended') actx.resume();
    if(!on){
      var master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
      var lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.connect(master);
      [55,55.35,82.5].forEach(function(f,i){
        var o=actx.createOscillator(); o.type='sine'; o.frequency.value=f;
        var g2=actx.createGain(); g2.gain.value=i===2?0.018:0.05;
        o.connect(g2); g2.connect(lp); o.start(); nodes.push(o,g2);
      });
      master.gain.linearRampToValueAtTime(0.9, actx.currentTime+3);
      nodes.push(master);
      on=true; btn.classList.add('on'); btn.textContent='◑';
    }else{
      var m=nodes[nodes.length-1];
      m.gain.linearRampToValueAtTime(0, actx.currentTime+1.4);
      setTimeout(function(){nodes.forEach(function(n){try{n.stop&&n.stop();}catch(e){}});nodes=[];},1600);
      on=false; btn.classList.remove('on'); btn.textContent='◐';
    }
  });

  /* ---------- a message for those who open the console ---------- */
  console.log('%c THE VESTIBULE ','background:#b23a2e;color:#0a0a0c;font:14px monospace;padding:4px 10px;');
  console.log('%cYou opened the inspector. Of course you did.\nThe registry keeps seventeen sealed thresholds.\nOnly one of them was never closed.\nIts designation is the answer.','color:#7d8a91;font:12px monospace;line-height:1.6');
})();
</script>
</body>
</html>
