<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Olle Axelsson</title>
  <meta name="description" content="Contact Olle Axelsson.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">OA</a>
    <ul class="nav-links">
      <li><a href="/about.html">about</a></li>
      <li><a href="/work.html">work</a></li>
      <li><a href="/contact.html">contact</a></li>
      <li><a href="/signal/" class="nav-ghost" aria-label="·" title="">·</a></li>
    </ul>
  </nav>

  <main class="main">

    <section class="hero">
      <div class="hero-label">CONTACT</div>
      <h1 class="hero-name">Get in touch</h1>
    </section>

    <section class="section">
      <h2 class="section-label">Message</h2>
      <form class="contact-form" id="contactForm">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="Write something." required></textarea>
        </div>
        <button type="submit" class="submit-btn">SEND MESSAGE</button>
        <p class="form-notice" id="formNotice" style="display:none"></p>
      </form>
    </section>

  </main>

  <footer class="footer">
    <span>© 2024 Olle Axelsson</span>
    <a href="/">home</a>
  </footer>

  <div class="carrier-banner">SIGNAL CARRIER — VESTIBULE ACTIVE</div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const notice = document.getElementById('formNotice');
      notice.style.display = 'block';
      // The reply is subtly wrong — "we" instead of "I"
      notice.innerHTML = 'Your message has been received.<br>We will be in touch.';
      notice.style.color = 'var(--text-3)';
      this.reset();
    });
  </script>
</body>
</html>
